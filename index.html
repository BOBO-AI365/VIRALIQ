<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>VIRALIQ</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
            padding: 50px;
        }

        .card {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            margin: auto;
        }

        button {
            padding: 10px 20px;
            background: #00ffcc;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>VIRALIQ 🚀</h1>
    <p>Discover what makes content go viral using AI 🚀</p>

<input id="inputText" placeholder="Paste your caption here..." style="padding:10px; width:80%; margin:10px 0; border-radius:8px; border:none;">

<button onclick="analyze()">Check virality 🚀</button>

<p id="result"></p>
</div>

<script>
function analyze() {

  let text = document.getElementById("inputText").value;
  let result = document.getElementById("result");
let t = text.toLowerCase();
let lang = "en";

if(t.includes("ljubav") || t.includes("novac") || t.includes("tajna")){
  lang = "hr";
} else if(t.includes("amor") || t.includes("dinero") || t.includes("secreto")){
  lang = "es";
}

  if(text.trim().length < 2){
  result.innerText = "Type something to analyze 🚀";
  return;
}
    

  result.innerText = "🤖 AI is analyzing your content...";

  setTimeout(() => {
    let score = Math.floor(Math.random() * 40) + 60;

    

if(
  t.includes("love") || t.includes("money") || t.includes("secret") ||
  t.includes("ljubav") || t.includes("novac") || t.includes("tajna") ||
  t.includes("dinero") || t.includes("amor") || t.includes("secreto")
){
      score = Math.floor(Math.random() * 20) + 80;
    }

    let message = "";

if(lang === "hr"){
  message = "🔥 Viralni score: " + score + "%";
} else if(lang === "es"){
  message = "🔥 Puntuación viral: " + score + "%";
} else {
  message = "🔥 Viral Score: " + score + "%";
}

result.innerText = message + "\n\n" +
"📊 Emotion: High\n" +
"🚀 Engagement: Strong\n" +
"🔥 Viral Potential: Boosted";
  }, 1500);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIRALIQ AI PRO 🚀</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 32px;
}

textarea {
  width: 90%;
  height: 120px;
  border-radius: 12px;
  padding: 12px;
  font-size: 16px;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  background: #00ffcc;
  font-weight: bold;
  cursor: pointer;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  margin-top: 20px;
  border-radius: 15px;
}

.pro {
  background: gold;
  color: black;
}
</style>

</head>
<body>

<h1>🔥 VIRALIQ AI PRO</h1>

<p>⚡ Limited offer: First users get PRO FREE</p>

<textarea id="inputText" placeholder="Type your idea..."></textarea>

<br>

<button onclick="analyze()">Analyze 🚀</button>
<button onclick="login()">Login 🔐</button>
<button onclick="upgrade()" class="pro">🔥 Unlock PRO</button>

<div class="card">
  <p id="user">Not logged in</p>
  <p id="plan">Plan: FREE</p>
  <p id="result"></p>
  <p id="stats"></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

// 🔥 UBACI SVOJ FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "future-ai-d5366.firebaseapp.com",
  projectId: "future-ai-d5366",
  ...
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(result => {
    const user = result.user;

    document.getElementById("user").innerText = "👤 " + user.email;

    db.collection("users").doc(user.uid).set({
      email: user.email,
      plan: "FREE",
      lastLogin: new Date()
    }, { merge: true });

    loadUserPlan(user.uid);
    loadStats();
  });
}

// ANALYZE
function analyze() {
  let text = document.getElementById("inputText").value;
  let result = document.getElementById("result");

  if (text.length < 3) {
    result.innerText = "⚠️ Enter more text";
    return;
  }

  result.innerText = "🤖 AI analyzing...";

  setTimeout(() => {

    let score = Math.floor(Math.random() * 40) + 60;

    let keywords = ["money","love","secret","viral","ai","business"];
    let boost = keywords.some(k => text.toLowerCase().includes(k));

    if (boost) score += 10;

    let emotion = ["Low","Medium","High"][Math.floor(Math.random()*3)];
    let engagement = ["Weak","Normal","Strong"][Math.floor(Math.random()*3)];

    result.innerText =
      "🔥 Viral Score: " + score + "%\n\n" +
      "📊 Emotion: " + emotion + "\n" +
      "🚀 Engagement: " + engagement + "\n" +
      "🔥 Potential: " + (score > 85 ? "MEGA VIRAL 🚀" : "Normal");

  }, 1500);
}

// UPGRADE (FREE PRO)
function upgrade() {
  let user = auth.currentUser;

  if (!user) {
    alert("Login first!");
    return;
  }

  db.collection("users").doc(user.uid).update({
    plan: "PRO"
  });

  document.getElementById("plan").innerText = "Plan: PRO 🚀";

  alert("🎉 You unlocked PRO!");
}

// LOAD PLAN
function loadUserPlan(uid) {
  db.collection("users").doc(uid).get().then(doc => {
    if (doc.exists) {
      let data = doc.data();
      document.getElementById("plan").innerText =
        "Plan: " + (data.plan || "FREE");
    }
  });
}

// STATS
function loadStats() {
  db.collection("users").get().then(snapshot => {
    document.getElementById("stats").innerText =
      "👥 Users: " + snapshot.size;
  });
}

// AUTO LOGIN
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("user").innerText = "👤 " + user.email;
    loadUserPlan(user.uid);
    loadStats();
  }
});

</script>

</body>
</html>
